name: Refresh Dashboard

on:
  schedule:
    - cron: '0 4 * * *'   # Daily at 04:00 UTC
  push:
    branches: [main]
    paths-ignore:
      - 'assets/*.svg'
      - 'scripts/data.json'
      - 'README.md'
  workflow_dispatch:       # Allow manual runs

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr2
            jsonlite

      - name: Fetch data from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: Rscript scripts/fetch_data.R

      - name: Render dashboard SVGs
        run: Rscript scripts/render_svg.R

      - name: Commit and push updated assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg scripts/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh dashboard [skip ci]"
            git push
          fi
