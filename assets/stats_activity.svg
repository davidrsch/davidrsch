<style>
  :root {
    --bg:        #f6f8fa;
    --card:      #ffffff;
    --border:    #d0d7de;
    --primary:   #1f2328;
    --secondary: #636c76;
    --muted:     #8c959f;
    --accent:    #0969da;
    --green:     #1a7f37;
