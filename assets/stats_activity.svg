      --bg:        #0d1117;
      --card:      #161b22;
      --border:    #30363d;
      --primary:   #e6edf3;
      --secondary: #848d97;
      --muted:     #7d8590;
      --accent:    #2f81f7;
      --green:     #3fb950;
      --yellow:    #d29922;
