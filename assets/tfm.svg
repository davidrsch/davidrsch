<svg xmlns="http://www.w3.org/2000/svg" width="405" height="195" viewBox="0 0 405 195">

  <defs>
    <clipPath id="logo-clip">
      <rect x="0" y="0" width="100%" height="100%" rx="6"/>
    </clipPath>
  </defs>
  

<style>
  :root {
    --bg:        #f6f8fa;
    --card:      #ffffff;
    --border:    #d0d7de;
    --primary:   #1f2328;
    --secondary: #636c76;
    --muted:     #8c959f;
    --accent:    #0969da;
    --green:     #1a7f37;
    --yellow:    #9a6700;
    --red:       #cf222e;
    --hover:     #f3f4f6;
    --spark-bg:  #f0f3f6;
    --spark:     #0969da;
    --pill:      #eaf1fb;
    --pill-txt:  #0969da;
    --div:       #d0d7de;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0d1117;
      --card:      #161b22;
      --border:    #30363d;
      --primary:   #e6edf3;
      --secondary: #848d97;
      --muted:     #7d8590;
      --accent:    #2f81f7;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --hover:     #21262d;
      --spark-bg:  #1c2128;
      --spark:     #58a6ff;
      --pill:      #1c2d3f;
      --pill-txt:  #58a6ff;
      --div:       #30363d;
    }
  }
  
  .bg          { fill: var(--bg); }
  .card        { fill: var(--card); stroke: var(--border); stroke-width: 1; }
  .lang-pill   { fill: var(--pill); }
  .spark-bg    { fill: var(--spark-bg); }
  .spark-line  { stroke: var(--spark); }
  .divider     { stroke: var(--div); stroke-width: 1; }
  .clr-primary   { fill: var(--primary); }
  .clr-secondary { fill: var(--secondary); }
  .clr-muted     { fill: var(--muted); }
  .clr-accent    { fill: var(--accent); }
  .clr-green     { fill: var(--green); }
  .clr-yellow    { fill: var(--yellow); }
  .clr-red       { fill: var(--red); }
  .txt-bold    { font-weight: 600; }
  svg text     { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
</style>

