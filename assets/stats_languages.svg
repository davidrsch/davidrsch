<svg xmlns="http://www.w3.org/2000/svg" width="405" height="140" viewBox="0 0 405 140">

<style>
  :root {
    --bg:        #f6f8fa;
    --card:      #ffffff;
    --border:    #d0d7de;
    --primary:   #1f2328;
    --secondary: #636c76;
    --muted:     #8c959f;
    --accent:    #0969da;
    --green:     #1a7f37;
    --yellow:    #9a6700;
    --red:       #cf222e;
    --hover:     #f3f4f6;
    --spark-bg:  #f0f3f6;
    --spark:     #0969da;
    --pill:      #eaf1fb;
    --pill-txt:  #0969da;
    --div:       #d0d7de;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0d1117;
      --card:      #161b22;
      --border:    #30363d;
      --primary:   #e6edf3;
      --secondary: #848d97;
      --muted:     #7d8590;
      --accent:    #2f81f7;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --hover:     #21262d;
      --spark-bg:  #1c2128;
      --spark:     #58a6ff;
      --pill:      #1c2d3f;
      --pill-txt:  #58a6ff;
      --div:       #30363d;
    }
  }
  
  .bg          { fill: var(--bg); }
  .card        { fill: var(--card); stroke: var(--border); stroke-width: 1; }
  .lang-pill   { fill: var(--pill); }
  .spark-bg    { fill: var(--spark-bg); }
  .spark-line  { stroke: var(--spark); }
  .divider     { stroke: var(--div); stroke-width: 1; }
  .clr-primary   { fill: var(--primary); }
  .clr-secondary { fill: var(--secondary); }
  .clr-muted     { fill: var(--muted); }
  .clr-accent    { fill: var(--accent); }
  .clr-green     { fill: var(--green); }
  .clr-yellow    { fill: var(--yellow); }
  .clr-red       { fill: var(--red); }
  .txt-bold    { font-weight: 600; }
  svg text     { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
</style>

<rect x="0" y="0" width="405" height="140" rx="8" class="card"/>
  <text x="20" y="24" class="clr-primary txt-bold" text-anchor="start" font-size="14">Most Used Languages</text>
  <rect x="20" y="40" width="219.025" height="8" fill="#198CE7" rx="4"/>
  <rect x="239.025" y="40" width="61.0672" height="8" fill="#3D6117" rx="0"/>
  <rect x="300.092" y="40" width="59.4331" height="8" fill="#0298c3" rx="0"/>
  <rect x="359.525" y="40" width="11.1796" height="8" fill="#f1e05a" rx="0"/>
  <rect x="370.704" y="40" width="8.1777" height="8" fill="#DA5B0B" rx="0"/>
  <rect x="378.882" y="40" width="6.11787" height="8" fill="#ccc" rx="4"/>
  <circle cx="24" cy="72" r="4" fill="#198CE7"/>
  <text x="36" y="76" class="clr-primary txt-bold" text-anchor="start" font-size="12">R</text>
  <text x="135" y="76" class="clr-muted" text-anchor="start" font-size="12">60.0%</text>
  <circle cx="24" cy="94" r="4" fill="#3D6117"/>
  <text x="36" y="98" class="clr-primary txt-bold" text-anchor="start" font-size="12">TeX</text>
  <text x="135" y="98" class="clr-muted" text-anchor="start" font-size="12">16.7%</text>
  <circle cx="24" cy="116" r="4" fill="#0298c3"/>
  <text x="36" y="120" class="clr-primary txt-bold" text-anchor="start" font-size="12">Perl</text>
  <text x="135" y="120" class="clr-muted" text-anchor="start" font-size="12">16.3%</text>
  <circle cx="219" cy="72" r="4" fill="#f1e05a"/>
  <text x="231" y="76" class="clr-primary txt-bold" text-anchor="start" font-size="12">JavaScript</text>
  <text x="330" y="76" class="clr-muted" text-anchor="start" font-size="12">3.1%</text>
  <circle cx="219" cy="94" r="4" fill="#DA5B0B"/>
  <text x="231" y="98" class="clr-primary txt-bold" text-anchor="start" font-size="12">Jupyter Notebook</text>
  <text x="330" y="98" class="clr-muted" text-anchor="start" font-size="12">2.2%</text>
  <circle cx="219" cy="116" r="4" fill="#ccc"/>
  <text x="231" y="120" class="clr-primary txt-bold" text-anchor="start" font-size="12">BibTeX Style</text>
  <text x="330" y="120" class="clr-muted" text-anchor="start" font-size="12">1.7%</text>
</svg>

